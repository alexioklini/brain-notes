<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brain Notes — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d0d; --bg2: #111111; --bg3: #161616;
  --border: rgba(255,255,255,0.06); --border-hover: rgba(255,255,255,0.12);
  --text: #f0f0f0; --text2: rgba(255,255,255,0.65); --text3: rgba(255,255,255,0.45);
  --cyan: #00D4FF; --red: #FF5252;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:48px 40px;width:380px;max-width:90vw}
.login-header{text-align:center;margin-bottom:32px}
.login-header svg{width:48px;height:48px;color:var(--cyan);margin-bottom:12px}
.login-header h1{font-size:22px;font-weight:600}
.login-header p{color:var(--text3);font-size:13px;margin-top:4px}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.field input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:8px;font-size:14px;font-family:inherit;outline:none;transition:border-color 150ms}
.field input:focus{border-color:var(--cyan)}
.login-btn{width:100%;background:var(--cyan);color:#000;border:none;padding:12px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:8px;transition:opacity 150ms}
.login-btn:hover{opacity:.9}
.login-btn:disabled{opacity:.5;cursor:not-allowed}
.error-msg{color:var(--red);font-size:13px;text-align:center;margin-top:12px;min-height:20px}
</style>
</head>
<body>
<div class="login-card">
  <div class="login-header">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a9 9 0 0 0-9 9c0 3.6 2.4 6.5 5.4 7.5.2.1.6.3.6.3V21a1 1 0 0 0 1 1h4a1 1 0 0 0 1-1v-2.2s.4-.2.6-.3C18.6 17.5 21 14.6 21 11a9 9 0 0 0-9-9z"/><path d="M9 12h.01"/><path d="M15 12h.01"/></svg>
    <h1>Brain Notes</h1>
    <p>Sign in to continue</p>
  </div>
  <form onsubmit="doLogin(event)">
    <div class="field">
      <label>Username</label>
      <input type="text" id="login-user" autocomplete="username" autofocus required>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="login-pass" autocomplete="current-password" required>
    </div>
    <button type="submit" class="login-btn" id="login-btn">Sign In</button>
    <div class="error-msg" id="login-error"></div>
  </form>
</div>
<script>
async function doLogin(e){
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('login-error');
  btn.disabled = true;
  err.textContent = '';
  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      credentials: 'include',
      body: JSON.stringify({
        username: document.getElementById('login-user').value,
        password: document.getElementById('login-pass').value
      })
    });
    const data = await r.json();
    if(!r.ok){
      err.textContent = data.error || 'Login failed';
      btn.disabled = false;
      return;
    }
    window.location.href = '/';
  } catch(e){
    err.textContent = 'Connection error';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
